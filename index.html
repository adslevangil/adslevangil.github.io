<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta
    name="description"
    content="Eason Game 的个人游戏站点，收录世界地图、可玩原型与正在制作中的项目预告。"
  />
  <title>Eason Game</title>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+SC:wght@400;500;700&display=swap");

    :root {
      --bg: #07111f;
      --panel: rgba(8, 15, 27, 0.82);
      --panel-strong: rgba(10, 19, 34, 0.94);
      --line: rgba(255, 232, 169, 0.24);
      --text: #f6f2e6;
      --muted: rgba(233, 240, 255, 0.74);
      --gold: #f2c879;
      --cyan: #8ee7ff;
      --shadow: 0 24px 60px rgba(0, 0, 0, 0.35);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
    }

    body {
      min-height: 100vh;
      overflow-x: hidden;
      color: var(--text);
      font-family: "Noto Sans SC", "Microsoft YaHei", sans-serif;
      background:
        radial-gradient(circle at top, rgba(77, 173, 255, 0.18), transparent 34%),
        linear-gradient(180deg, rgba(4, 8, 18, 0.22), rgba(4, 8, 18, 0.92)),
        url("/easongame.png") center / cover fixed;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        linear-gradient(120deg, rgba(255, 217, 123, 0.08), transparent 36%),
        linear-gradient(300deg, rgba(85, 213, 255, 0.08), transparent 34%);
      pointer-events: none;
    }

    #particles-js {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    main {
      position: relative;
      z-index: 1;
      width: min(1200px, calc(100vw - 40px));
      margin: 0 auto;
      padding: 40px 0 56px;
    }

    .hero,
    .shelf,
    .footnote {
      opacity: 0;
      transform: translateY(28px);
      animation: rise 0.7s ease forwards;
    }

    .shelf {
      animation-delay: 0.12s;
    }

    .footnote {
      animation-delay: 0.24s;
    }

    .hero {
      position: relative;
      padding: 34px;
      border: 1px solid var(--line);
      border-radius: 28px;
      background: linear-gradient(180deg, rgba(10, 19, 34, 0.58), rgba(10, 19, 34, 0.84));
      backdrop-filter: blur(10px);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .hero::after {
      content: "";
      position: absolute;
      inset: auto -12% -24% 48%;
      height: 220px;
      background: radial-gradient(circle, rgba(142, 231, 255, 0.22), transparent 64%);
      pointer-events: none;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 8px 14px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(255, 255, 255, 0.06);
      color: var(--muted);
      font-size: 13px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    .eyebrow::before {
      content: "";
      width: 9px;
      height: 9px;
      border-radius: 999px;
      background: linear-gradient(180deg, var(--gold), #ff7b54);
      box-shadow: 0 0 18px rgba(255, 200, 121, 0.8);
    }

    .hero-grid {
      display: grid;
      grid-template-columns: minmax(0, 1.25fr) minmax(280px, 0.75fr);
      gap: 28px;
      margin-top: 22px;
      align-items: end;
    }

    h1 {
      margin: 0 0 8px;
      font-family: "Bebas Neue", sans-serif;
      font-size: clamp(64px, 12vw, 128px);
      line-height: 0.9;
      letter-spacing: 0.08em;
      text-shadow: 0 0 30px rgba(142, 231, 255, 0.25);
    }

    .lead {
      max-width: 640px;
      margin: 0;
      color: var(--muted);
      font-size: clamp(17px, 2vw, 22px);
      line-height: 1.8;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
      margin-top: 28px;
    }

    .stat {
      padding: 14px 16px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .stat strong {
      display: block;
      margin-bottom: 4px;
      color: var(--gold);
      font-size: 26px;
    }

    .stat span {
      color: var(--muted);
      font-size: 13px;
    }

    .hero-note {
      display: grid;
      gap: 14px;
      padding: 22px;
      border-radius: 22px;
      background: linear-gradient(180deg, rgba(7, 12, 22, 0.52), rgba(7, 12, 22, 0.9));
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .hero-note p {
      margin: 0;
      color: var(--muted);
      line-height: 1.7;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }

    .button,
    .sound-toggle {
      appearance: none;
      border: 1px solid transparent;
      border-radius: 999px;
      padding: 12px 18px;
      font: inherit;
      color: var(--text);
      cursor: pointer;
      text-decoration: none;
      transition: transform 0.18s ease, border-color 0.18s ease, background 0.18s ease;
    }

    .button:hover,
    .sound-toggle:hover {
      transform: translateY(-2px);
    }

    .button-primary {
      background: linear-gradient(135deg, #ffcb7a, #ff9966);
      color: #23150d;
      border-color: rgba(255, 255, 255, 0.12);
      font-weight: 700;
    }

    .button-secondary,
    .sound-toggle {
      background: rgba(255, 255, 255, 0.06);
      border-color: rgba(255, 255, 255, 0.14);
    }

    .shelf {
      margin-top: 28px;
    }

    .section-head {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: end;
      margin-bottom: 18px;
    }

    .section-head h2 {
      margin: 0;
      font-size: clamp(26px, 3vw, 42px);
      letter-spacing: 0.04em;
    }

    .section-head p {
      margin: 0;
      max-width: 540px;
      color: var(--muted);
      line-height: 1.7;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 18px;
    }

    .card {
      position: relative;
      min-height: 320px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      border-radius: 28px;
      border: 1px solid var(--line);
      background: var(--panel);
      box-shadow: var(--shadow);
      color: inherit;
      text-decoration: none;
      isolation: isolate;
      transition: transform 0.22s ease, border-color 0.22s ease, box-shadow 0.22s ease;
    }

    .card:hover {
      transform: translateY(-6px);
      border-color: rgba(255, 219, 145, 0.58);
      box-shadow: 0 28px 70px rgba(0, 0, 0, 0.42);
    }

    .card.is-disabled {
      cursor: default;
    }

    .card.is-disabled:hover {
      transform: none;
      border-color: var(--line);
      box-shadow: var(--shadow);
    }

    .cover-img,
    .cover-fallback {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: -2;
    }

    .cover-fallback {
      display: grid;
      place-items: center;
      padding: 24px;
      background:
        radial-gradient(circle at top, rgba(142, 231, 255, 0.2), transparent 35%),
        linear-gradient(180deg, rgba(7, 13, 23, 0.5), rgba(7, 13, 23, 0.94));
      color: rgba(255, 236, 190, 0.86);
      text-align: center;
      line-height: 1.7;
      opacity: 0;
      transition: opacity 0.2s ease;
    }

    .card.has-fallback .cover-fallback {
      opacity: 1;
    }

    .card::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(180deg, rgba(0, 0, 0, 0.04), rgba(0, 0, 0, 0.12) 38%, rgba(3, 7, 15, 0.92)),
        linear-gradient(130deg, rgba(142, 231, 255, 0.16), transparent 35%);
      z-index: -1;
    }

    .card-body {
      padding: 22px;
    }

    .chip-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      margin-bottom: 14px;
    }

    .chip,
    .state {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: 32px;
      padding: 6px 12px;
      border-radius: 999px;
      font-size: 12px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .chip {
      color: #fff7de;
      background: rgba(0, 0, 0, 0.28);
      border: 1px solid rgba(255, 255, 255, 0.14);
    }

    .state {
      color: #261a0e;
      font-weight: 700;
      background: linear-gradient(135deg, #ffd58b, #ffab72);
    }

    .state.is-live {
      background: linear-gradient(135deg, #8ee7ff, #7ef7c6);
    }

    .card h3 {
      margin: 0;
      font-size: clamp(28px, 3vw, 42px);
      line-height: 1.05;
      letter-spacing: 0.04em;
    }

    .card p {
      margin: 12px 0 0;
      color: rgba(239, 245, 255, 0.8);
      line-height: 1.7;
    }

    .card small {
      display: block;
      margin-top: 16px;
      color: rgba(255, 224, 168, 0.82);
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .footnote {
      margin-top: 22px;
      padding: 18px 20px;
      border-radius: 22px;
      background: var(--panel-strong);
      border: 1px solid rgba(255, 255, 255, 0.08);
      color: var(--muted);
      line-height: 1.8;
      box-shadow: var(--shadow);
    }

    .footnote strong {
      color: var(--gold);
    }

    .visually-hidden {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    @keyframes rise {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 920px) {
      .hero-grid,
      .grid,
      .stats {
        grid-template-columns: 1fr;
      }

      .section-head {
        align-items: start;
        flex-direction: column;
      }
    }

    @media (max-width: 720px) {
      body {
        background-attachment: scroll;
      }

      main {
        width: min(100vw - 24px, 1200px);
        padding: 18px 0 28px;
      }

      .hero,
      .footnote {
        padding: 22px;
      }

      .hero-note {
        padding: 18px;
      }

      .card {
        min-height: 280px;
      }
    }
  </style>
</head>
<body>
  <div id="particles-js" aria-hidden="true"></div>

  <main>
    <section class="hero">
      <div class="eyebrow">Eason Game Portal</div>
      <div class="hero-grid">
        <div>
          <h1>EASON GAME</h1>
          <p class="lead">
            个人游戏世界入口，集中展示世界观设定、交互地图与可玩原型。现在已经可以直接进入修仙地图和生存小游戏。
          </p>
          <div class="stats" aria-label="站点统计">
            <div class="stat">
              <strong>4</strong>
              <span>当前项目卡片</span>
            </div>
            <div class="stat">
              <strong>2</strong>
              <span>可直接体验页面</span>
            </div>
            <div class="stat">
              <strong>1</strong>
              <span>自定义域名已启用</span>
            </div>
          </div>
        </div>

        <aside class="hero-note">
          <p>这个站点目前走的是“作品入口页”路线：轻量、直接、可快速上线新概念页。</p>
          <div class="actions">
            <a class="button button-primary" href="/guichu-xiuxian-map.html">进入世界地图</a>
            <a class="button button-secondary" href="/game.html">开始小游戏</a>
            <button class="sound-toggle" id="soundToggle" type="button" aria-pressed="false">
              打开 BGM
            </button>
          </div>
        </aside>
      </div>
    </section>

    <section class="shelf" aria-labelledby="projectsTitle">
      <div class="section-head">
        <div>
          <h2 id="projectsTitle">项目陈列</h2>
          <p>已上线的页面会直接进入；开发中的项目保留视觉卡片，避免点开后落到空链接。</p>
        </div>
      </div>
      <div class="grid" id="projectGrid"></div>
    </section>

    <section class="footnote">
      <strong>www.easongame.com</strong>
      是 Eason Game 的世界入口。
      从这里出发，进入不同项目、不同城市、不同结局。
    </section>
  </main>

  <audio id="bgm" loop preload="auto">
    <source src="/1.mp3" type="audio/mpeg" />
  </audio>

  <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
  <script>
    const projects = [
      {
        title: "虚界之心",
        subtitle: "Story Portal",
        status: "进入世界",
        description: "查看主线大纲、城市试炼、核心角色与三种终局设定。",
        image: "/assets/projects/xujiezhixin/hero.png?v=20260523b",
        href: "/xujiezhixin.html?v=1",
        live: true
      },
      {
        title: "鬼畜修仙传",
        subtitle: "Cultivation RPG",
        status: "立即进入",
        description: "浏览大世界地图，查看州域、势力与核心城市设定。",
        image: "/assets/projects/guichu-xiuxian-cover.png?v=20260519c",
        href: "/guichu-xiuxian-map.html?v=4",
        live: true
      },
      {
        title: "躲避小游戏",
        subtitle: "Arcade Survival",
        status: "开始挑战",
        description: "30 秒生存挑战，支持鼠标、触摸和键盘操作。",
        image: "/easongame2.png",
        href: "/game.html?v=2",
        live: true
      },
      {
        title: "巴比伦",
        subtitle: "Cyber Myth",
        status: "开发中",
        description: "赛博神话题材概念页，保留预告视觉，等待后续内容接入。",
        image: "/assets/projects/babylon-cover.png?v=20260519c"
      }
    ];

    const grid = document.getElementById("projectGrid");
    const bgm = document.getElementById("bgm");
    const soundToggle = document.getElementById("soundToggle");

    function createCard(project) {
      const element = document.createElement(project.href ? "a" : "article");
      element.className = `card${project.href ? "" : " is-disabled"}`;
      if (project.href) {
        element.href = project.href;
        element.setAttribute("aria-label", `${project.title}，${project.status}`);
      }

      element.innerHTML = `
        <img
          class="cover-img"
          src="${project.image}"
          alt="${project.title}封面"
          loading="lazy"
        />
        <div class="cover-fallback">封面加载失败<br />${project.title}</div>
        <div class="card-body">
          <div class="chip-row">
            <span class="chip">${project.subtitle}</span>
            <span class="state${project.live ? " is-live" : ""}">${project.status}</span>
          </div>
          <h3>${project.title}</h3>
          <p>${project.description}</p>
          <small>${project.href ? "Click to enter" : "Coming soon"}</small>
        </div>
      `;

      const image = element.querySelector(".cover-img");
      image.addEventListener("error", () => {
        element.classList.add("has-fallback");
      });

      return element;
    }

    projects.forEach((project) => {
      grid.appendChild(createCard(project));
    });

    async function syncAudioUI() {
      const isPlaying = !bgm.paused;
      soundToggle.textContent = isPlaying ? "关闭 BGM" : "打开 BGM";
      soundToggle.setAttribute("aria-pressed", String(isPlaying));
    }

    soundToggle.addEventListener("click", async () => {
      if (bgm.paused) {
        try {
          await bgm.play();
        } catch (error) {
          console.warn("BGM play blocked:", error);
        }
      } else {
        bgm.pause();
      }
      syncAudioUI();
    });

    bgm.volume = 0.45;
    bgm
      .play()
      .then(syncAudioUI)
      .catch(() => syncAudioUI());

    if (window.particlesJS) {
      particlesJS("particles-js", {
        particles: {
          number: { value: 66 },
          size: { value: 3 },
          color: { value: "#f6f2e6" },
          line_linked: {
            enable: true,
            distance: 135,
            color: "#8ee7ff",
            opacity: 0.25
          },
          move: { enable: true, speed: 1.1 }
        },
        interactivity: {
          events: {
            onhover: { enable: true, mode: "repulse" },
            onclick: { enable: true, mode: "push" }
          },
          modes: {
            repulse: { distance: 95 },
            push: { particles_nb: 3 }
          }
        }
      });
    }
  </script>
</body>
</html>
