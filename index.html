<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Eason's Game</title>
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; }
    body {
      margin: 0;
      min-height: 100vh;
      background:
        linear-gradient(180deg, rgba(3,7,18,.35), rgba(3,7,18,.95)),
        url("/easongame.png") center / cover fixed;
      color: white;
      font-family: Arial, "Microsoft YaHei", sans-serif;
      overflow-x: hidden;
    }
    #particles-js { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
    main {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 48px;
      gap: 42px;
    }
    .hero { text-align: center; text-shadow: 0 0 18px #00ffff, 0 5px 25px #000; }
    h1 { margin: 0; font-size: clamp(42px, 8vw, 92px); letter-spacing: .08em; }
    .hero p { font-size: clamp(16px, 2vw, 22px); opacity: .86; }
    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 26px;
      max-width: 1280px;
      width: 100%;
      margin: auto;
    }
    .card {
      position: relative;
      overflow: hidden;
      min-height: 310px;
      border-radius: 22px;
      border: 1px solid rgba(255,255,255,.25);
      box-shadow: 0 25px 70px rgba(0,0,0,.55);
      color: white;
      text-decoration: none;
      background: #111;
      transition: .22s;
    }
    .card:hover {
      transform: translateY(-8px);
      border-color: #ffd46f;
      box-shadow: 0 32px 80px rgba(0,0,0,.65), 0 0 35px rgba(255,210,100,.25);
    }
    .cover-img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: .25s;
      z-index: 0;
    }
    .card:hover .cover-img { transform: scale(1.07); }
    .card::after {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 1;
      background: linear-gradient(180deg, rgba(0,0,0,.08) 8%, rgba(0,0,0,.15) 38%, rgba(0,0,0,.9));
    }
    .card-content {
      position: absolute;
      z-index: 2;
      left: 0;
      right: 0;
      bottom: 0;
      padding: 24px;
    }
    .card span {
      display: inline-block;
      border: 1px solid #ffd46f;
      border-radius: 999px;
      padding: 5px 10px;
      color: #ffe4a3;
      background: rgba(0,0,0,.35);
      font-size: 13px;
    }
    h2 {
      margin: 10px 0 4px;
      font-size: clamp(28px, 3vw, 44px);
      letter-spacing: .08em;
      text-shadow: 0 4px 14px #000;
    }
    .card p { margin: 0; color: #d8ecff; letter-spacing: .08em; }
    .img-error {
      display: none;
      position: absolute;
      inset: 0;
      z-index: 3;
      place-items: center;
      padding: 20px;
      background: rgba(0,0,0,.75);
      color: #ffe3a3;
      text-align: center;
      line-height: 1.6;
    }
    @media (max-width: 850px) {
      body { overflow: auto; }
      main { padding: 24px; justify-content: flex-start; }
      .grid { grid-template-columns: 1fr; }
      .card { min-height: 260px; }
    }
  </style>
</head>
<body>
  <div id="particles-js"></div>

  <main>
    <section class="hero">
      <h1>EASON·GAME</h1>
      <p>个人游戏世界入口：虚界冒险、荒诞修仙、赛博巴比伦。</p>
    </section>

    <section class="grid">
      <a class="card" href="#">
        <img class="cover-img" src="/assets/projects/xujiezhixin-cover.png?v=20260519c" alt="虚界之心封面" onerror="this.nextElementSibling.style.display='grid'" />
        <div class="img-error">封面加载失败<br />/assets/projects/xujiezhixin-cover.png</div>
        <div class="card-content">
          <span>开发中</span>
          <h2>虚界之心</h2>
          <p>Eason Game</p>
        </div>
      </a>

      <a class="card" href="/guichu-xiuxian-map.html?v=3">
        <img class="cover-img" src="/assets/projects/guichu-xiuxian-cover.png?v=20260519c" alt="鬼畜修仙传封面" onerror="this.nextElementSibling.style.display='grid'" />
        <div class="img-error">封面加载失败<br />/assets/projects/guichu-xiuxian-cover.png</div>
        <div class="card-content">
          <span>进入地图</span>
          <h2>鬼畜修仙传</h2>
          <p>Cultivation RPG</p>
        </div>
      </a>

      <a class="card" href="#">
        <img class="cover-img" src="/assets/projects/babylon-cover.png?v=20260519c" alt="巴比伦封面" onerror="this.nextElementSibling.style.display='grid'" />
        <div class="img-error">封面加载失败<br />/assets/projects/babylon-cover.png</div>
        <div class="card-content">
          <span>开发中</span>
          <h2>巴比伦</h2>
          <p>Babylon</p>
        </div>
      </a>
    </section>
  </main>

  <audio autoplay loop>
    <source src="/1.mp3" type="audio/mpeg" />
  </audio>

  <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
  <script>
    if (window.particlesJS) {
      particlesJS("particles-js", {
        particles: {
          number: { value: 70 },
          size: { value: 3 },
          color: { value: "#ffffff" },
          line_linked: { enable: true, distance: 125, color: "#ffffff", opacity: 0.3 },
          move: { enable: true, speed: 1.2 }
        },
        interactivity: {
          events: {
            onhover: { enable: true, mode: "repulse" },
            onclick: { enable: true, mode: "push" }
          },
          modes: {
            repulse: { distance: 100 },
            push: { particles_nb: 4 }
          }
        }
      });
    }
  </script>
</body>
</html>
