<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta
    name="description"
    content="Eason Game 的 30 秒生存躲避小游戏，支持鼠标、触摸和键盘操作。"
  />
  <title>躲避小游戏</title>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+SC:wght@400;500;700&display=swap");

    :root {
      --bg: #020711;
      --panel: rgba(8, 15, 27, 0.82);
      --line: rgba(132, 214, 255, 0.18);
      --text: #f6f8ff;
      --muted: rgba(235, 242, 255, 0.75);
      --accent: #84d6ff;
      --accent-2: #ffd98b;
      --danger: #ff7461;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 16px;
      overflow: hidden;
      color: var(--text);
      font-family: "Noto Sans SC", "Microsoft YaHei", sans-serif;
      background:
        radial-gradient(circle at top, rgba(132, 214, 255, 0.18), transparent 28%),
        radial-gradient(circle at bottom, rgba(255, 217, 139, 0.14), transparent 24%),
        linear-gradient(180deg, #05101f, var(--bg));
    }

    .shell {
      position: relative;
      width: min(1100px, 100%);
      border-radius: 28px;
      overflow: hidden;
      border: 1px solid var(--line);
      background: rgba(5, 10, 19, 0.92);
      box-shadow: 0 28px 90px rgba(0, 0, 0, 0.38);
    }

    .hud {
      position: absolute;
      inset: 0 0 auto 0;
      z-index: 3;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      padding: 14px 18px;
      background: linear-gradient(180deg, rgba(3, 7, 14, 0.92), rgba(3, 7, 14, 0.28));
      pointer-events: none;
    }

    .hud-group {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      min-height: 40px;
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(8px);
      font-size: 13px;
    }

    .pill strong {
      color: var(--accent-2);
      font-size: 20px;
      font-family: "Bebas Neue", sans-serif;
      letter-spacing: 0.06em;
    }

    .arena {
      position: relative;
      aspect-ratio: 16 / 9;
      min-height: min(76vh, 700px);
      background:
        linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px),
        linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
        radial-gradient(circle at center, rgba(132, 214, 255, 0.08), transparent 48%),
        linear-gradient(180deg, rgba(5, 10, 19, 0.92), rgba(2, 7, 17, 1));
      background-size: 32px 32px, 32px 32px, auto, auto;
      touch-action: none;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    .overlay {
      position: absolute;
      inset: 0;
      z-index: 4;
      display: grid;
      place-items: center;
      padding: 24px;
      background: rgba(2, 7, 17, 0.68);
      backdrop-filter: blur(10px);
    }

    .overlay[hidden] {
      display: none;
    }

    .panel {
      width: min(520px, 100%);
      padding: 28px;
      border-radius: 28px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: linear-gradient(180deg, rgba(8, 15, 27, 0.96), rgba(8, 15, 27, 0.88));
      text-align: left;
      box-shadow: 0 24px 70px rgba(0, 0, 0, 0.4);
    }

    .panel span {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 7px 12px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.06);
      color: var(--muted);
      font-size: 12px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .panel h1 {
      margin: 14px 0 10px;
      font-size: clamp(42px, 8vw, 68px);
      line-height: 0.95;
      font-family: "Bebas Neue", sans-serif;
      letter-spacing: 0.06em;
    }

    .panel p {
      margin: 0;
      color: var(--muted);
      line-height: 1.8;
    }

    .tips {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin: 20px 0 0;
    }

    .tip {
      padding: 12px 14px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 22px;
    }

    .button {
      appearance: none;
      border: 1px solid transparent;
      border-radius: 999px;
      padding: 12px 18px;
      font: inherit;
      text-decoration: none;
      cursor: pointer;
      transition: transform 0.18s ease, border-color 0.18s ease, background 0.18s ease;
    }

    .button:hover {
      transform: translateY(-2px);
    }

    .button-primary {
      background: linear-gradient(135deg, var(--accent), #69f4ce);
      color: #0b1728;
      font-weight: 700;
    }

    .button-secondary {
      background: rgba(255, 255, 255, 0.06);
      border-color: rgba(255, 255, 255, 0.12);
      color: var(--text);
    }

    .status {
      margin-top: 18px;
      color: rgba(255, 217, 139, 0.9);
      font-size: 14px;
    }

    .assistive {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    @media (max-width: 760px) {
      body {
        padding: 0;
      }

      .shell {
        border-radius: 0;
        min-height: 100vh;
      }

      .arena {
        min-height: 100vh;
      }

      .hud {
        padding: 12px;
        align-items: start;
        flex-direction: column;
      }

      .tips {
        grid-template-columns: 1fr;
      }

      .panel {
        padding: 22px;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="hud" aria-label="游戏状态">
      <div class="hud-group">
        <div class="pill">倒计时 <strong id="timeValue">30.0</strong></div>
        <div class="pill">难度 <strong id="levelValue">01</strong></div>
        <div class="pill">最佳 <strong id="bestValue">0.0</strong></div>
      </div>
      <div class="hud-group">
        <div class="pill">操作：拖动 / 点击 / WASD / 方向键</div>
      </div>
    </section>

    <section class="arena" id="arena">
      <canvas id="gameCanvas"></canvas>

      <div class="overlay" id="overlay">
        <div class="panel">
          <span>Arcade Survival</span>
          <h1 id="panelTitle">躲避小游戏</h1>
          <p id="panelCopy">
            在弹幕中生存 30 秒。鼠标或手指可以直接引导方块移动，键盘也可微调走位。
          </p>
          <div class="tips">
            <div class="tip">蓝色方块是你，红色光点会从边缘高速切入。</div>
            <div class="tip">时间越久，生成速度越快。撑满 30 秒就算通关。</div>
          </div>
          <div class="actions">
            <button class="button button-primary" id="startBtn" type="button">开始游戏</button>
            <a class="button button-secondary" href="/index.html">返回首页</a>
          </div>
          <div class="status" id="panelStatus">准备就绪。</div>
        </div>
      </div>
    </section>
  </main>

  <p class="assistive" id="srStatus" aria-live="polite"></p>

  <script>
    const STORAGE_KEY = "easonGameBestSeconds";
    const GAME_DURATION = 30;

    const arena = document.getElementById("arena");
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    const overlay = document.getElementById("overlay");
    const startBtn = document.getElementById("startBtn");
    const panelTitle = document.getElementById("panelTitle");
    const panelCopy = document.getElementById("panelCopy");
    const panelStatus = document.getElementById("panelStatus");
    const srStatus = document.getElementById("srStatus");
    const timeValue = document.getElementById("timeValue");
    const levelValue = document.getElementById("levelValue");
    const bestValue = document.getElementById("bestValue");

    const pointer = { active: false, x: 0, y: 0 };
    const keys = new Set();

    let arenaWidth = 0;
    let arenaHeight = 0;
    let deviceScale = 1;

    let player;
    let bullets = [];
    let lastFrame = 0;
    let spawnTimer = 0;
    let remaining = GAME_DURATION;
    let rafId = 0;
    let state = "menu";
    let bestSeconds = Number(localStorage.getItem(STORAGE_KEY) || 0);

    function updateBestUI() {
      bestValue.textContent = bestSeconds.toFixed(1);
    }

    function resizeCanvas() {
      const rect = arena.getBoundingClientRect();
      arenaWidth = rect.width;
      arenaHeight = rect.height;
      deviceScale = Math.min(window.devicePixelRatio || 1, 2);

      canvas.width = Math.floor(arenaWidth * deviceScale);
      canvas.height = Math.floor(arenaHeight * deviceScale);
      ctx.setTransform(deviceScale, 0, 0, deviceScale, 0, 0);

      if (player) {
        player.x = Math.min(player.x, arenaWidth - player.size);
        player.y = Math.min(player.y, arenaHeight - player.size);
        player.targetX = Math.min(player.targetX, arenaWidth - player.size);
        player.targetY = Math.min(player.targetY, arenaHeight - player.size);
      }
    }

    function announce(message) {
      srStatus.textContent = message;
      panelStatus.textContent = message;
    }

    function resetPlayer() {
      player = {
        x: arenaWidth * 0.5 - 10,
        y: arenaHeight * 0.5 - 10,
        size: 20,
        speed: 300,
        targetX: arenaWidth * 0.5 - 10,
        targetY: arenaHeight * 0.5 - 10
      };
    }

    function resetGame() {
      bullets = [];
      remaining = GAME_DURATION;
      spawnTimer = 0;
      lastFrame = 0;
      resetPlayer();
      timeValue.textContent = remaining.toFixed(1);
      levelValue.textContent = "01";
    }

    function openOverlay(title, copy, buttonText) {
      panelTitle.textContent = title;
      panelCopy.textContent = copy;
      startBtn.textContent = buttonText;
      overlay.hidden = false;
    }

    function clampPlayer() {
      player.x = Math.max(0, Math.min(arenaWidth - player.size, player.x));
      player.y = Math.max(0, Math.min(arenaHeight - player.size, player.y));
      player.targetX = Math.max(0, Math.min(arenaWidth - player.size, player.targetX));
      player.targetY = Math.max(0, Math.min(arenaHeight - player.size, player.targetY));
    }

    function spawnBullet() {
      const edge = Math.floor(Math.random() * 4);
      const margin = 18;
      let x = 0;
      let y = 0;

      if (edge === 0) {
        x = -margin;
        y = Math.random() * arenaHeight;
      } else if (edge === 1) {
        x = arenaWidth + margin;
        y = Math.random() * arenaHeight;
      } else if (edge === 2) {
        x = Math.random() * arenaWidth;
        y = -margin;
      } else {
        x = Math.random() * arenaWidth;
        y = arenaHeight + margin;
      }

      const targetX = player.x + player.size * 0.5 + (Math.random() - 0.5) * 80;
      const targetY = player.y + player.size * 0.5 + (Math.random() - 0.5) * 80;
      const dx = targetX - x;
      const dy = targetY - y;
      const length = Math.hypot(dx, dy) || 1;
      const progress = 1 - remaining / GAME_DURATION;
      const speed = 170 + progress * 220 + Math.random() * 40;
      const size = 7 + Math.random() * 4;

      bullets.push({
        x,
        y,
        size,
        vx: (dx / length) * speed,
        vy: (dy / length) * speed
      });
    }

    function updateDifficulty() {
      const progress = 1 - remaining / GAME_DURATION;
      const level = Math.min(99, 1 + Math.floor(progress * 12));
      levelValue.textContent = String(level).padStart(2, "0");
      return Math.max(0.18, 0.75 - progress * 0.48);
    }

    function updatePlayer(dt) {
      const distance = player.speed * dt;

      if (pointer.active) {
        player.targetX = pointer.x - player.size * 0.5;
        player.targetY = pointer.y - player.size * 0.5;
      }

      let keyboardX = 0;
      let keyboardY = 0;

      if (keys.has("ArrowLeft") || keys.has("a") || keys.has("A")) keyboardX -= 1;
      if (keys.has("ArrowRight") || keys.has("d") || keys.has("D")) keyboardX += 1;
      if (keys.has("ArrowUp") || keys.has("w") || keys.has("W")) keyboardY -= 1;
      if (keys.has("ArrowDown") || keys.has("s") || keys.has("S")) keyboardY += 1;

      if (keyboardX || keyboardY) {
        const norm = Math.hypot(keyboardX, keyboardY) || 1;
        player.x += (keyboardX / norm) * distance;
        player.y += (keyboardY / norm) * distance;
        player.targetX = player.x;
        player.targetY = player.y;
      } else {
        const dx = player.targetX - player.x;
        const dy = player.targetY - player.y;
        const length = Math.hypot(dx, dy);

        if (length > distance) {
          player.x += (dx / length) * distance;
          player.y += (dy / length) * distance;
        } else {
          player.x = player.targetX;
          player.y = player.targetY;
        }
      }

      clampPlayer();
    }

    function updateBullets(dt) {
      bullets = bullets.filter((bullet) => {
        bullet.x += bullet.vx * dt;
        bullet.y += bullet.vy * dt;

        return (
          bullet.x > -40 &&
          bullet.x < arenaWidth + 40 &&
          bullet.y > -40 &&
          bullet.y < arenaHeight + 40
        );
      });
    }

    function collides(bullet) {
      const px = player.x + player.size * 0.5;
      const py = player.y + player.size * 0.5;
      const bx = bullet.x;
      const by = bullet.y;
      const radius = bullet.size + player.size * 0.45;

      return Math.hypot(px - bx, py - by) < radius;
    }

    function finishGame(result) {
      cancelAnimationFrame(rafId);
      state = result;

      const survived = Number((GAME_DURATION - remaining).toFixed(1));
      if (survived > bestSeconds) {
        bestSeconds = survived;
        localStorage.setItem(STORAGE_KEY, String(bestSeconds));
        updateBestUI();
      }

      if (result === "win") {
        announce(`成功通关，生存 ${GAME_DURATION.toFixed(0)} 秒。`);
        openOverlay("成功通关", "你撑满了 30 秒，下一步可以继续挑战更高的最佳成绩。", "再来一局");
      } else {
        announce(`挑战失败，生存 ${survived.toFixed(1)} 秒。`);
        openOverlay("游戏失败", `这次坚持了 ${survived.toFixed(1)} 秒。调整走位，再试一次。`, "重新开始");
      }
    }

    function drawBackground() {
      ctx.clearRect(0, 0, arenaWidth, arenaHeight);

      ctx.fillStyle = "rgba(132, 214, 255, 0.06)";
      for (let x = 0; x < arenaWidth; x += 64) {
        ctx.fillRect(x, 0, 1, arenaHeight);
      }
      for (let y = 0; y < arenaHeight; y += 64) {
        ctx.fillRect(0, y, arenaWidth, 1);
      }

      ctx.fillStyle = "rgba(255, 255, 255, 0.02)";
      for (let y = 0; y < arenaHeight; y += 8) {
        ctx.fillRect(0, y, arenaWidth, 1);
      }
    }

    function drawPlayer() {
      ctx.save();
      ctx.shadowBlur = 18;
      ctx.shadowColor = "rgba(132, 214, 255, 0.8)";
      ctx.fillStyle = "#84d6ff";
      ctx.fillRect(player.x, player.y, player.size, player.size);
      ctx.restore();
    }

    function drawBullets() {
      bullets.forEach((bullet) => {
        ctx.beginPath();
        ctx.fillStyle = "rgba(255, 116, 97, 0.95)";
        ctx.shadowBlur = 12;
        ctx.shadowColor = "rgba(255, 116, 97, 0.75)";
        ctx.arc(bullet.x, bullet.y, bullet.size, 0, Math.PI * 2);
        ctx.fill();
      });
      ctx.shadowBlur = 0;
    }

    function draw() {
      drawBackground();
      drawBullets();
      drawPlayer();
    }

    function tick(timestamp) {
      if (state !== "playing") return;

      if (!lastFrame) lastFrame = timestamp;
      const dt = Math.min((timestamp - lastFrame) / 1000, 0.032);
      lastFrame = timestamp;

      remaining = Math.max(0, remaining - dt);
      timeValue.textContent = remaining.toFixed(1);

      const spawnDelay = updateDifficulty();
      spawnTimer += dt;
      while (spawnTimer >= spawnDelay) {
        spawnTimer -= spawnDelay;
        spawnBullet();
      }

      updatePlayer(dt);
      updateBullets(dt);

      if (bullets.some(collides)) {
        draw();
        finishGame("lose");
        return;
      }

      draw();

      if (remaining <= 0) {
        finishGame("win");
        return;
      }

      rafId = requestAnimationFrame(tick);
    }

    function startGame() {
      resizeCanvas();
      resetGame();
      overlay.hidden = true;
      state = "playing";
      announce("游戏开始，生存 30 秒。");
      draw();
      rafId = requestAnimationFrame(tick);
    }

    function updatePointerPosition(event) {
      const rect = arena.getBoundingClientRect();
      pointer.x = event.clientX - rect.left;
      pointer.y = event.clientY - rect.top;
    }

    arena.addEventListener("pointerdown", (event) => {
      pointer.active = true;
      updatePointerPosition(event);
    });

    arena.addEventListener("pointermove", (event) => {
      if (!pointer.active) return;
      updatePointerPosition(event);
    });

    window.addEventListener("pointerup", () => {
      pointer.active = false;
    });

    window.addEventListener("keydown", (event) => {
      if (["ArrowLeft", "ArrowRight", "ArrowUp", "ArrowDown", "a", "A", "s", "S", "d", "D", "w", "W"].includes(event.key)) {
        event.preventDefault();
      }
      keys.add(event.key);
    });

    window.addEventListener("keyup", (event) => {
      keys.delete(event.key);
    });

    window.addEventListener("resize", resizeCanvas);
    startBtn.addEventListener("click", startGame);

    updateBestUI();
    resizeCanvas();
    resetPlayer();
    draw();
    announce("准备就绪。");
  </script>
</body>
</html>
